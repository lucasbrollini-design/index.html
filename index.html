<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Assessment Competenze — Skillvue</title>
<style>
@font-face {
  font-family: 'Mona Sans';
  src: url('https://github.githubassets.com/assets/mona-sans.woff2') format('woff2');
  font-weight: 100 900;
  font-style: normal;
}

/* ── RESET ── */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
button { font-family: inherit; cursor: pointer; border: none; background: none; }
a { text-decoration: none; }

/* ── TOKENS (Skillvue DS) ── */
:root {
  /* Brand */
  --primary:        #4F46E5;
  --primary-hover:  #4338CA;
  --primary-light:  #EEF2FF;
  --primary-text:   #3730A3;

  /* Neutrals */
  --n900: #111827;
  --n700: #374151;
  --n500: #6B7280;
  --n400: #9CA3AF;
  --n300: #D1D5DB;
  --n200: #E5E7EB;
  --n100: #F3F4F6;
  --n50:  #F9FAFB;
  --n0:   #FFFFFF;

  /* Semantic */
  --info-bg:    #EFF6FF; --info-border:   #BFDBFE; --info-text:    #1D4ED8;
  --success-bg: #F0FDF4; --success-border:#BBF7D0; --success-text: #15803D;
  --warning-bg: #FFFBEB; --warning-border:#FDE68A; --warning-text: #B45309;
  --danger-bg:  #FEF2F2; --danger-border: #FECACA; --danger-text:  #B91C1C;

  /* Shadows */
  --shadow-sm: 0 1px 3px rgba(0,0,0,.08);
  --shadow-md: 0 4px 12px rgba(0,0,0,.10);

  /* Radius */
  --r-sm: 4px;
  --r-md: 8px;
  --r-lg: 12px;
  --r-full: 9999px;

  /* Sidebar */
  --sidebar-w: 239px;
  --topbar-h: 56px;

  /* Macro area colors */
  --mc0: #4F46E5;
  --mc1: #0369A1;
  --mc2: #7C3AED;
  --mc3: #B45309;
  --mc4: #047857;
}

/* ── BASE ── */
html { font-size: 14px; }
body {
  font-family: 'Mona Sans', system-ui, sans-serif;
  background: var(--n50);
  color: var(--n700);
  line-height: 1.5;
  min-height: 100vh;
}

/* ── TOPBAR ── */
.topbar {
  position: fixed;
  top: 0; left: 0; right: 0;
  height: var(--topbar-h);
  background: var(--n0);
  border-bottom: 1px solid var(--n200);
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 0 24px;
  z-index: 200;
  box-shadow: var(--shadow-sm);
}

.topbar-left { display: flex; align-items: center; gap: 16px; }

.logo-svg { display: block; height: 22px; width: auto; }

.topbar-divider {
  width: 1px; height: 20px;
  background: var(--n200);
}

.topbar-title {
  font-size: 14px;
  font-weight: 600;
  color: var(--n900);
  letter-spacing: -0.01em;
}

/* Role switcher as Tab component */
.role-tabs {
  display: flex;
  border-bottom: none;
  gap: 2px;
  background: var(--n100);
  padding: 3px;
  border-radius: var(--r-md);
}
.role-tab {
  height: 32px;
  padding: 0 14px;
  border-radius: 6px;
  font-size: 13px;
  font-weight: 500;
  color: var(--n500);
  transition: all 0.15s;
  white-space: nowrap;
}
.role-tab:hover { color: var(--n700); }
.role-tab.active {
  background: var(--n0);
  color: var(--primary);
  box-shadow: var(--shadow-sm);
  font-weight: 600;
}

/* ── SIDEBAR ── */
.sidebar {
  position: fixed;
  left: 0;
  top: var(--topbar-h);
  bottom: 0;
  width: var(--sidebar-w);
  background: var(--n0);
  border-right: 1px solid var(--n200);
  overflow-y: auto;
  overflow-x: hidden;
  padding: 16px 0 24px;
  z-index: 100;
}

.sidebar::-webkit-scrollbar { width: 4px; }
.sidebar::-webkit-scrollbar-track { background: transparent; }
.sidebar::-webkit-scrollbar-thumb { background: var(--n200); border-radius: 4px; }

.sidebar-label {
  font-size: 11px;
  font-weight: 600;
  letter-spacing: 0.1em;
  text-transform: uppercase;
  color: var(--n400);
  padding: 0 16px 8px;
  margin-top: 8px;
}

/* Overview nav item */
.nav-overview {
  display: flex;
  align-items: center;
  gap: 10px;
  height: 40px;
  padding: 0 16px;
  font-size: 14px;
  font-weight: 500;
  color: var(--n700);
  width: 100%;
  text-align: left;
  transition: background 0.1s;
  border-left: 2px solid transparent;
}
.nav-overview:hover { background: var(--n50); }
.nav-overview.active {
  background: var(--primary-light);
  color: var(--primary);
  border-left-color: var(--primary);
}
.nav-overview svg { color: var(--n400); flex-shrink: 0; }
.nav-overview.active svg { color: var(--primary); }

/* Macro group */
.macro-group { margin-bottom: 2px; }

.macro-btn {
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 8px;
  height: 40px;
  padding: 0 16px;
  font-size: 13px;
  font-weight: 600;
  color: var(--n700);
  width: 100%;
  text-align: left;
  transition: background 0.1s;
}
.macro-btn:hover { background: var(--n50); }
.macro-btn-left { display: flex; align-items: center; gap: 8px; }
.macro-dot {
  width: 8px; height: 8px;
  border-radius: 50%;
  flex-shrink: 0;
}
.macro-chevron {
  transition: transform 0.2s;
  color: var(--n400);
  flex-shrink: 0;
}
.macro-btn.open .macro-chevron { transform: rotate(90deg); }

/* Competenza items */
.comp-list { overflow: hidden; max-height: 0; transition: max-height 0.25s ease; }
.comp-list.open { max-height: 999px; }

.comp-btn {
  display: block;
  width: 100%;
  text-align: left;
  height: 36px;
  padding: 0 16px 0 34px;
  font-size: 13px;
  color: var(--n500);
  transition: all 0.1s;
  border-left: 2px solid transparent;
  position: relative;
}
.comp-btn:hover { background: var(--n50); color: var(--n700); }
.comp-btn.active {
  background: var(--primary-light);
  color: var(--primary);
  font-weight: 600;
  border-left-color: var(--primary);
}

/* ── MAIN CONTENT ── */
.main {
  margin-left: var(--sidebar-w);
  margin-top: var(--topbar-h);
  padding: 24px;
  min-height: calc(100vh - var(--topbar-h));
}

.content-inner { max-width: 1024px; }

/* ── PAGE HEADER ── */
.page-header { margin-bottom: 24px; }
.page-title {
  font-size: 24px;
  font-weight: 700;
  color: var(--n900);
  letter-spacing: -0.02em;
  line-height: 1.3;
  margin-bottom: 4px;
}
.page-sub {
  font-size: 14px;
  color: var(--n500);
}

/* ── STATS ROW ── */
.stats-row {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 16px;
  margin-bottom: 32px;
}
.stat-card {
  background: var(--n0);
  border: 1px solid var(--n200);
  border-radius: var(--r-lg);
  padding: 20px;
  box-shadow: var(--shadow-sm);
}
.stat-num {
  font-size: 32px;
  font-weight: 800;
  color: var(--primary);
  letter-spacing: -0.03em;
  line-height: 1;
  margin-bottom: 6px;
}
.stat-label {
  font-size: 12px;
  font-weight: 500;
  color: var(--n500);
  text-transform: uppercase;
  letter-spacing: 0.06em;
}

/* ── SECTION TITLE ── */
.section-label {
  font-size: 11px;
  font-weight: 600;
  letter-spacing: 0.1em;
  text-transform: uppercase;
  color: var(--n400);
  margin-bottom: 12px;
}

/* ── MACRO CARDS GRID ── */
.macro-cards {
  display: grid;
  grid-template-columns: repeat(2, 1fr);
  gap: 16px;
  margin-bottom: 32px;
}
.macro-card {
  background: var(--n0);
  border: 1px solid var(--n200);
  border-radius: var(--r-lg);
  padding: 20px;
  cursor: pointer;
  transition: box-shadow 0.2s, transform 0.2s;
  position: relative;
  overflow: hidden;
  box-shadow: var(--shadow-sm);
}
.macro-card::before {
  content: '';
  position: absolute;
  left: 0; top: 0; bottom: 0;
  width: 3px;
}
.macro-card:hover {
  box-shadow: var(--shadow-md);
  transform: translateY(-1px);
}
.macro-card-header {
  display: flex;
  align-items: flex-start;
  justify-content: space-between;
  margin-bottom: 8px;
  padding-left: 12px;
}
.macro-card-title {
  font-size: 15px;
  font-weight: 700;
  color: var(--n900);
  letter-spacing: -0.01em;
  line-height: 1.3;
}
.macro-card-meta {
  font-size: 12px;
  color: var(--n500);
  padding-left: 12px;
  margin-bottom: 12px;
}
.macro-card-chips {
  display: flex;
  flex-wrap: wrap;
  gap: 6px;
  padding-left: 12px;
}

/* ── TAG / BADGE ── */
.tag {
  display: inline-flex;
  align-items: center;
  height: 24px;
  padding: 0 8px;
  border-radius: var(--r-full);
  font-size: 12px;
  font-weight: 500;
}
.tag-neutral  { background: var(--n100); color: var(--n700); }
.tag-accent   { background: var(--primary-light); color: var(--primary-text); }
.tag-success  { background: var(--success-bg); color: var(--success-text); }
.tag-warning  { background: var(--warning-bg); color: var(--warning-text); }
.tag-danger   { background: var(--danger-bg); color: var(--danger-text); }
.tag-info     { background: var(--info-bg); color: var(--info-text); }
.tag-outline  { background: transparent; border: 1px solid var(--n300); color: var(--n700); }

/* ── DETAIL VIEW ── */
.breadcrumb {
  display: flex;
  align-items: center;
  gap: 6px;
  font-size: 13px;
  color: var(--n500);
  margin-bottom: 8px;
}
.breadcrumb-sep { color: var(--n300); }
.breadcrumb-active { color: var(--primary); font-weight: 500; }

.detail-title {
  font-size: 24px;
  font-weight: 750;
  color: var(--n900);
  letter-spacing: -0.02em;
  line-height: 1.3;
  margin-bottom: 12px;
}

.declaratoria {
  background: var(--primary-light);
  border-left: 3px solid var(--primary);
  border-radius: 0 var(--r-md) var(--r-md) 0;
  padding: 14px 16px;
  font-size: 13px;
  line-height: 1.65;
  color: var(--primary-text);
  max-width: 720px;
  margin-bottom: 32px;
}

/* ── DRIVER TABLE ── */
.driver-table {
  background: var(--n0);
  border: 1px solid var(--n200);
  border-radius: var(--r-lg);
  overflow: hidden;
  margin-bottom: 32px;
  max-width: 720px;
  box-shadow: var(--shadow-sm);
}
.driver-table-head {
  display: grid;
  grid-template-columns: 200px 1fr;
  background: var(--n100);
  height: 40px;
  padding: 0 16px;
  align-items: center;
  border-bottom: 1px solid var(--n200);
}
.driver-table-head span {
  font-size: 12px;
  font-weight: 600;
  color: var(--n700);
  text-transform: uppercase;
  letter-spacing: 0.06em;
}
.driver-row {
  display: grid;
  grid-template-columns: 200px 1fr;
  padding: 12px 16px;
  border-bottom: 1px solid var(--n200);
  align-items: start;
  gap: 16px;
  transition: background 0.1s;
}
.driver-row:last-child { border-bottom: none; }
.driver-row:hover { background: var(--n50); }
.driver-name {
  font-size: 13px;
  font-weight: 600;
  color: var(--n900);
  line-height: 1.4;
}
.driver-desc {
  font-size: 13px;
  color: var(--n700);
  line-height: 1.55;
}

/* ── QUESTION CARDS ── */
.question-list { display: flex; flex-direction: column; gap: 12px; max-width: 720px; }

.question-card {
  background: var(--n0);
  border: 1px solid var(--n200);
  border-radius: var(--r-lg);
  padding: 16px 20px;
  box-shadow: var(--shadow-sm);
  position: relative;
}
.question-card-top {
  display: flex;
  align-items: center;
  gap: 8px;
  margin-bottom: 10px;
}
.q-num {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  width: 22px; height: 22px;
  border-radius: var(--r-full);
  background: var(--primary-light);
  color: var(--primary);
  font-size: 11px;
  font-weight: 700;
  flex-shrink: 0;
}
.q-text {
  font-size: 13px;
  line-height: 1.65;
  color: var(--n700);
}

/* ── NAVIGATION BUTTONS ── */
.detail-nav {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-top: 40px;
  padding-top: 24px;
  border-top: 1px solid var(--n200);
  max-width: 720px;
}

/* Buttons (DS spec) */
.btn {
  display: inline-flex;
  align-items: center;
  gap: 8px;
  height: 36px;
  padding: 0 16px;
  border-radius: var(--r-md);
  font-size: 14px;
  font-weight: 600;
  font-family: inherit;
  transition: all 0.15s;
  cursor: pointer;
  border: none;
}
.btn-solid-primary { background: var(--primary); color: white; }
.btn-solid-primary:hover { background: var(--primary-hover); }
.btn-outline-primary {
  background: var(--n0);
  color: var(--primary);
  border: 1.5px solid var(--primary);
}
.btn-outline-primary:hover { background: var(--primary-light); }
.btn-ghost-primary { background: transparent; color: var(--primary); }
.btn-ghost-primary:hover { background: var(--primary-light); }

/* ── EMPTY STATE ── */
.empty-state {
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  padding: 64px 24px;
  text-align: center;
}
.empty-icon {
  width: 48px; height: 48px;
  background: var(--n100);
  border-radius: var(--r-lg);
  display: flex; align-items: center; justify-content: center;
  margin-bottom: 16px;
  color: var(--n400);
}
.empty-title { font-size: 16px; font-weight: 600; color: var(--n900); margin-bottom: 4px; }
.empty-body { font-size: 14px; color: var(--n500); }

/* ── MACRO COLOR ASSIGNMENTS ── */
.mc0 { --mc: var(--mc0); }
.mc1 { --mc: var(--mc1); }
.mc2 { --mc: var(--mc2); }
.mc3 { --mc: var(--mc3); }
.mc4 { --mc: var(--mc4); }

.macro-card.mc0::before { background: var(--mc0); }
.macro-card.mc1::before { background: var(--mc1); }
.macro-card.mc2::before { background: var(--mc2); }
.macro-card.mc3::before { background: var(--mc3); }
.macro-card.mc4::before { background: var(--mc4); }

.macro-dot.mc0 { background: var(--mc0); }
.macro-dot.mc1 { background: var(--mc1); }
.macro-dot.mc2 { background: var(--mc2); }
.macro-dot.mc3 { background: var(--mc3); }
.macro-dot.mc4 { background: var(--mc4); }

/* ── RESPONSIVE ── */
@media (max-width: 860px) {
  .sidebar { display: none; }
  .main { margin-left: 0; }
  .stats-row { grid-template-columns: 1fr 1fr; }
  .macro-cards { grid-template-columns: 1fr; }
  .driver-table-head, .driver-row { grid-template-columns: 1fr; }
  .driver-table-head span:last-child { display: none; }
}
</style>
</head>

// ── STATE ─────────────────────────────────────────────────────
let role = 'sa';
let view = 'overview'; // 'overview' | 'detail'
let selMacro = null;
let selComp = null;
let openMacros = {};

// ── HELPERS ───────────────────────────────────────────────────
function rd() { return DATA[role]; }

function stats() {
  let macros = rd().macro.length, comps = 0, drivers = 0, questions = 0;
  rd().macro.forEach(m => { comps += m.competenze.length; m.competenze.forEach(c => { drivers += c.drivers.length; questions += c.questions.length; }); });
  return {macros, comps, drivers, questions};
}

function allComps() {
  const list = [];
  rd().macro.forEach((m, mi) => m.competenze.forEach((c, ci) => list.push([mi, ci])));
  return list;
}

// ── ICONS (inline SVG, lucide style) ──────────────────────────
const icons = {
  grid: `<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/></svg>`,
  chevron: `<svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="9 18 15 12 9 6"/></svg>`,
  arrowLeft: `<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="19" y1="12" x2="5" y2="12"/><polyline points="12 19 5 12 12 5"/></svg>`,
  arrowRight: `<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="5" y1="12" x2="19" y2="12"/><polyline points="12 5 19 12 12 19"/></svg>`,
};

// ── SIDEBAR RENDER ─────────────────────────────────────────────
function renderSidebar() {
  const d = rd();
  let h = '';

  h += `<div class="sidebar-label" style="margin-top:8px">Navigazione</div>`;
  h += `<button class="nav-overview ${view==='overview'?'active':''}" onclick="goOverview()">
    ${icons.grid} Panoramica
  </button>`;

  h += `<div class="sidebar-label" style="margin-top:16px">Competenze</div>`;

  d.macro.forEach((m, mi) => {
    const key = role + mi;
    const isOpen = !!openMacros[key];
    h += `<div class="macro-group">
      <button class="macro-btn ${isOpen?'open':''}" onclick="toggleMacro(${mi})">
        <span class="macro-btn-left">
          <span class="macro-dot ${m.color}"></span>
          ${m.name}
        </span>
        <span class="macro-chevron">${icons.chevron}</span>
      </button>
      <div class="comp-list ${isOpen?'open':''}">`;
    m.competenze.forEach((c, ci) => {
      const active = view==='detail' && selMacro===mi && selComp===ci;
      h += `<button class="comp-btn ${active?'active':''}" onclick="goDetail(${mi},${ci})">${c.name}</button>`;
    });
    h += `</div></div>`;
  });

  document.getElementById('sidebar').innerHTML = h;
}

// ── OVERVIEW ───────────────────────────────────────────────────
function renderOverview() {
  const d = rd();
  const s = stats();
  const roleLabel = role==='sa' ? 'Sales Advisor' : 'Store Manager';

  let h = `
  <div class="page-header">
    <div class="page-title">${roleLabel}</div>
    <div class="page-sub">Framework di valutazione delle competenze Skillvue</div>
  </div>

  <div class="stats-row">
    <div class="stat-card"><div class="stat-num">${s.macros}</div><div class="stat-label">Aree Macro</div></div>
    <div class="stat-card"><div class="stat-num">${s.comps}</div><div class="stat-label">Competenze</div></div>
    <div class="stat-card"><div class="stat-num">${s.drivers}</div><div class="stat-label">Driver Comportamentali</div></div>
    <div class="stat-card"><div class="stat-num">${s.questions}</div><div class="stat-label">Domande Assessment</div></div>
  </div>

  <div class="section-label">Aree di Competenza</div>
  <div class="macro-cards">`;

  d.macro.forEach((m, mi) => {
    h += `<div class="macro-card ${m.color}" onclick="expandMacro(${mi})" style="cursor:pointer">
      <div class="macro-card-header">
        <div class="macro-card-title">${m.name}</div>
      </div>
      <div class="macro-card-meta">${m.competenze.length} competenz${m.competenze.length===1?'a':'e'} · ${m.competenze.reduce((a,c)=>a+c.drivers.length,0)} driver · ${m.competenze.reduce((a,c)=>a+c.questions.length,0)} domande</div>
      <div class="macro-card-chips">
        ${m.competenze.map(c=>`<span class="tag tag-outline">${c.name}</span>`).join('')}
      </div>
    </div>`;
  });

  h += `</div>`;
  document.getElementById('main-content').innerHTML = h;
}

// ── DETAIL ─────────────────────────────────────────────────────
function renderDetail(mi, ci) {
  const d = rd();
  const macro = d.macro[mi];
  const comp = macro.competenze[ci];

  const all = allComps();
  const idx = all.findIndex(([m,c]) => m===mi && c===ci);
  const prev = all[idx-1];
  const next = all[idx+1];

  let h = `
  <div class="breadcrumb">
    <button onclick="goOverview()" style="color:var(--primary);font-size:13px;cursor:pointer;background:none;border:none;font-family:inherit">Panoramica</button>
    <span class="breadcrumb-sep">›</span>
    <span style="color:var(--n500)">${macro.name}</span>
    <span class="breadcrumb-sep">›</span>
    <span class="breadcrumb-active">${comp.name}</span>
  </div>

  <div style="margin-bottom:24px">
    <div class="detail-title">${comp.name}</div>
    <div class="declaratoria">${comp.dec}</div>
  </div>

  <div class="section-label">Driver Comportamentali</div>
  <div class="driver-table">
    <div class="driver-table-head">
      <span>Driver</span>
      <span>Descrizione</span>
    </div>`;

  comp.drivers.forEach(dr => {
    h += `<div class="driver-row">
      <div class="driver-name">${dr.name}</div>
      <div class="driver-desc">${dr.desc}</div>
    </div>`;
  });

  h += `</div>
  <div class="section-label">Domande di Assessment</div>
  <div class="question-list">`;

  comp.questions.forEach((q, qi) => {
    const typeLabel = q.type === 'behavioral' ? 'Comportamentale' : 'Situazionale';
    const typeClass = q.type === 'behavioral' ? 'tag-info' : 'tag-success';
    h += `<div class="question-card">
      <div class="question-card-top">
        <span class="q-num">${qi+1}</span>
        <span class="tag ${typeClass}">${typeLabel}</span>
      </div>
      <div class="q-text">${q.text}</div>
    </div>`;
  });

  h += `</div>
  <div class="detail-nav">
    <div>`;

  if (prev) {
    const pm = d.macro[prev[0]].competenze[prev[1]].name;
    h += `<button class="btn btn-outline-primary" onclick="goDetail(${prev[0]},${prev[1]})">${icons.arrowLeft} ${pm}</button>`;
  } else {
    h += `<button class="btn btn-outline-primary" onclick="goOverview()">${icons.arrowLeft} Panoramica</button>`;
  }

  h += `</div><div>`;

  if (next) {
    const nm = d.macro[next[0]].competenze[next[1]].name;
    h += `<button class="btn btn-solid-primary" onclick="goDetail(${next[0]},${next[1]})">${nm} ${icons.arrowRight}</button>`;
  }

  h += `</div></div>`;

  document.getElementById('main-content').innerHTML = h;
  window.scrollTo({top:0, behavior:'smooth'});
}

// ── ACTIONS ────────────────────────────────────────────────────
function goOverview() {
  view = 'overview'; selMacro = null; selComp = null;
  renderSidebar(); renderOverview();
}

function goDetail(mi, ci) {
  view = 'detail'; selMacro = mi; selComp = ci;
  openMacros[role + mi] = true;
  renderSidebar(); renderDetail(mi, ci);
}

function toggleMacro(mi) {
  const key = role + mi;
  openMacros[key] = !openMacros[key];
  renderSidebar();
}

function expandMacro(mi) {
  openMacros[role + mi] = true;
  goDetail(mi, 0);
}

function switchRole(r) {
  role = r;
  view = 'overview'; selMacro = null; selComp = null;
  document.querySelectorAll('.role-tab').forEach((t,i) => {
    t.classList.toggle('active', (i===0 && r==='sa') || (i===1 && r==='sm'));
  });
  renderSidebar(); renderOverview();
}

// ── INIT ───────────────────────────────────────────────────────
renderSidebar();
renderOverview();
</script>
</body>
